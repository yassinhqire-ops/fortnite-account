<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YF Store - حسابات فورت نايت</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b10;--card:#12141c;--border:#1e2030;--primary:#00bfff;--accent:#6a0dad;--fg:#d4d8e8;--muted:#6b7194;--muted-bg:#181a28}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;direction:rtl}
.font-display{font-family:'Orbitron',sans-serif}
.container{max-width:1200px;margin:0 auto;padding:0 1rem}

/* Glow effects */
.neon-text{text-shadow:0 0 10px rgba(0,191,255,0.6),0 0 30px rgba(0,191,255,0.3)}
.neon-glow-blue{box-shadow:0 0 10px rgba(0,191,255,0.4),0 0 30px rgba(0,191,255,0.15)}
.neon-glow-purple{box-shadow:0 0 10px rgba(106,13,173,0.4),0 0 30px rgba(106,13,173,0.15)}

/* Header */
header{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);background:rgba(10,11,16,0.85);backdrop-filter:blur(20px)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:1.4rem;font-weight:700;letter-spacing:3px;color:var(--primary)}
.header-btns{display:flex;gap:10px}
.icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:1px solid var(--border);background:var(--muted-bg);cursor:pointer;transition:all .3s;position:relative;color:var(--primary)}
.icon-btn:hover{box-shadow:0 0 15px rgba(0,191,255,0.4);border-color:var(--primary)}
.icon-btn.cart-btn{color:var(--accent)}
.icon-btn.cart-btn:hover{box-shadow:0 0 15px rgba(106,13,173,0.4);border-color:var(--accent)}
.badge{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--primary);color:#0a0b10;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.badge.hidden{display:none}

/* Hero */
.hero{padding:4rem 0;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,191,255,0.05),transparent,rgba(106,13,173,0.05))}
.hero-icon{width:56px;height:56px;margin:0 auto 1rem;border-radius:12px;background:rgba(0,191,255,0.1);display:flex;align-items:center;justify-content:center}
.hero h2{font-size:2rem;font-weight:700;letter-spacing:2px}
.hero h2 span{color:var(--primary)}
.hero p{max-width:450px;margin:0.75rem auto 0;font-size:0.875rem;color:var(--muted)}

/* Products Grid */
.products{padding:2.5rem 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem}
.product-card{border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:hidden;cursor:pointer;transition:all .3s}
.product-card:hover{box-shadow:0 0 15px rgba(0,191,255,0.3);border-color:rgba(0,191,255,0.4)}
.product-card:hover .card-img img{transform:scale(1.1)}
.card-img{position:relative;aspect-ratio:1;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.card-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,11,16,0.9),transparent)}
.card-img .skins-badge{position:absolute;bottom:12px;right:12px;z-index:2;background:rgba(0,191,255,0.2);color:var(--primary);padding:2px 10px;border-radius:6px;font-size:0.75rem;font-weight:500;backdrop-filter:blur(8px)}
.card-body{padding:1rem}
.card-body h3{font-size:0.875rem;font-weight:600;letter-spacing:1px}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:0.75rem}
.card-price{font-size:1.125rem;font-weight:700;color:var(--primary)}
.add-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:none;background:rgba(0,191,255,0.1);color:var(--primary);font-size:0.75rem;font-weight:500;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.add-btn:hover{background:var(--primary);color:#0a0b10}

/* Modal Overlay */
.modal-overlay{position:fixed;inset:0;z-index:60;background:rgba(10,11,16,0.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border-radius:16px;border:1px solid var(--border);background:var(--card);position:relative}
.modal.glow{box-shadow:0 0 20px rgba(0,191,255,0.3)}
.modal-close{position:absolute;top:12px;left:12px;z-index:10;width:32px;height:32px;border-radius:50%;border:none;background:var(--muted-bg);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:color .2s}
.modal-close:hover{color:var(--fg)}
.modal img{width:100%;height:250px;object-fit:cover}
.modal-body{padding:1.5rem}
.modal-body h2{font-size:1.2rem;font-weight:700;letter-spacing:1px}
.modal-body .skins-badge{display:inline-block;margin-top:6px;background:rgba(0,191,255,0.2);color:var(--primary);padding:2px 10px;border-radius:6px;font-size:0.75rem}
.modal-body .desc{margin-top:1rem;font-size:0.875rem;line-height:1.7;color:var(--muted)}
.extras{margin-top:1rem}
.extras h4{font-size:0.875rem;font-weight:600;margin-bottom:0.5rem}
.extras .item{display:flex;align-items:center;gap:8px;font-size:0.875rem;color:var(--muted);margin-bottom:6px}
.extras .item .check{color:var(--primary);font-weight:700}
.modal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem}
.modal-price{font-size:1.5rem;font-weight:700;color:var(--primary)}
.modal-add-btn{display:flex;align-items:center;gap:8px;padding:10px 24px;border-radius:10px;border:none;background:var(--primary);color:#0a0b10;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .3s}
.modal-add-btn:hover{box-shadow:0 0 20px rgba(0,191,255,0.5)}

/* Cart Drawer */
.cart-overlay{position:fixed;inset:0;z-index:60;background:rgba(10,11,16,0.7);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
.cart-overlay.open{opacity:1;pointer-events:auto}
.cart-drawer{position:fixed;top:0;left:0;z-index:70;width:100%;max-width:400px;height:100%;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s}
.cart-drawer.open{transform:translateX(0)}
.cart-header{display:flex;align-items:center;justify-content:space-between;padding:1rem;border-bottom:1px solid var(--border)}
.cart-header h2{font-size:1.1rem;font-weight:700;letter-spacing:1px}
.cart-items{flex:1;overflow-y:auto;padding:1rem}
.cart-empty{text-align:center;color:var(--muted);font-size:0.875rem;margin-top:3rem}
.cart-item{display:flex;gap:12px;padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(24,26,40,0.5);margin-bottom:12px}
.cart-item img{width:64px;height:64px;border-radius:8px;object-fit:cover}
.cart-item-info{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.cart-item-top{display:flex;justify-content:space-between;align-items:flex-start}
.cart-item-top h4{font-size:0.875rem;font-weight:600}
.delete-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px}
.delete-btn:hover{color:#f87171}
.cart-item-bottom{display:flex;justify-content:space-between;align-items:center}
.qty-controls{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--muted-bg);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:border-color .2s}
.qty-btn:hover{border-color:var(--primary)}
.qty-num{min-width:24px;text-align:center;font-size:0.875rem;font-weight:500}
.cart-item-price{font-size:0.875rem;font-weight:700;color:var(--primary)}
.cart-footer{border-top:1px solid var(--border);padding:1rem}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.cart-total span:first-child{font-size:0.875rem;color:var(--muted)}
.cart-total span:last-child{font-size:1.2rem;font-weight:700;color:var(--primary)}
.checkout-btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:600;font-size:0.875rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Orbitron',sans-serif;letter-spacing:1px;transition:all .3s}
.checkout-btn:hover{box-shadow:0 0 20px rgba(0,191,255,0.4)}
.checkout-note{text-align:center;font-size:0.75rem;color:var(--muted);margin-top:8px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);z-index:100;background:var(--card);border:1px solid var(--primary);border-radius:10px;padding:10px 20px;font-size:0.875rem;color:var(--primary);transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* SVG icons inline */
svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media(max-width:640px){
  .hero h2{font-size:1.4rem}
  .grid{grid-template-columns:1fr 1fr;gap:0.75rem}
  .card-body h3{font-size:0.75rem}
  .card-price{font-size:0.9rem}
  .add-btn span{display:none}
  .cart-drawer{max-width:100%}
}
@media(max-width:380px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

</div>

    <p class="checkout-note">لإتمام الطلب يرجى التواصل عبر تيليجرام</p>

</div>

];

let cart = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function updateBadge() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.classList.toggle('hidden', total === 0);
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({...p, qty: 1});
  updateBadge();
  renderCart();
  showToast('تمت إضافة "' + p.name + '" إلى السلة');
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  updateBadge();
  renderCart();
}

function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) return removeFromCart(id);
  updateBadge();
  renderCart();
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="openModal(${p.id})">
      <div class="card-img">
        <img src="${p.image}" alt="${p.name}">
        <span class="skins-badge">${p.skins} سكن</span>
      </div>
      <div class="card-body">
        <h3 class="font-display">${p.name}</h3>
        <div class="card-footer">
          <span class="card-price font-display neon-text">$${p.price}</span>
          <button class="add-btn" onclick="event.stopPropagation();addToCart(${p.id})">
            <svg viewBox="0 0 24 24" style="width:14px;height:14px"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            <span>إضافة للسلة</span>
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  document.getElementById('modalImg').src = p.image;
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalSkins').textContent = p.skins + ' سكن';
  document.getElementById('modalDesc').textContent = p.description;
  document.getElementById('modalExtras').innerHTML = '<h4>محتويات الحساب:</h4>' + p.extras.map(e => `<div class="item"><span class="check">✓</span> ${e}</div>`).join('');
  document.getElementById('modalPrice').textContent = '$' + p.price;
  document.getElementById('modalAddBtn').onclick = () => { addToCart(p.id); closeModal(); };
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleCart() {
  const overlay = document.getElementById('cartOverlay');
  const drawer = document.getElementById('cartDrawer');
  const isOpen = drawer.classList.contains('open');
  overlay.classList.toggle('open', !isOpen);
  drawer.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
  if (!isOpen) renderCart();
}

function renderCart() {
  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (cart.length === 0) {
    container.innerHTML = '<p class="cart-empty">السلة فارغة</p>';
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'block';
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cartTotal').textContent = '$' + total;
  container.innerHTML = cart.map(i => `
    <div class="cart-item">
      <img src="${i.image}" alt="${i.name}">
      <div class="cart-item-info">
        <div class="cart-item-top">
          <h4>${i.name}</h4>
          <button class="delete-btn" onclick="removeFromCart(${i.id})">🗑</button>
        </div>
        <div class="cart-item-bottom">
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
            <span class="qty-num">${i.qty}</span>
            <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
          </div>
          <span class="cart-item-price font-display">$${i.price * i.qty}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function checkout() {
  window.open('https://t.me/YASS_910', '_blank');
}

renderProducts();
</script>
